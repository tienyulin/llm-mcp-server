# mcp-server — attaches to the SHARED infra (llm-wiki-infra: minio + pg on the
# external docker network `llm-wiki-net`). Reads the same MinIO + Postgres that
# wiki-processor writes, so the query results reflect live data.
#
# Start the shared infra FIRST (once):
#   (cd ../llm-wiki-infra && docker compose up -d)
# Then:
#   cp .env.example .env
#   docker compose up -d --build
#   curl localhost:8002/health
services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-server
    ports:
      - "8002:8002"
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-wiki-data}
      PG_DSN: ${PG_DSN:-postgresql://wiki:wikipass@pg:5432/wiki}
      PG_RETRY_SECONDS: ${PG_RETRY_SECONDS:-30}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}
      EMBEDDING_SEND_DIMENSIONS: ${EMBEDDING_SEND_DIMENSIONS:-false}
      MOCK_EMBEDDINGS: ${MOCK_EMBEDDINGS:-true}
      MCP_ALLOWED_HOSTS: ${MCP_ALLOWED_HOSTS:-}
      MCP_ALLOWED_ORIGINS: ${MCP_ALLOWED_ORIGINS:-}
    networks: [llm-wiki-net]
    command: python http_api/main.py

# Shared network owned by llm-wiki-infra. Start that stack first, or this fails
# with "network llm-wiki-net not found".
networks:
  llm-wiki-net:
    external: true
